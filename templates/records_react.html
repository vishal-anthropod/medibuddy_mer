<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MediBuddy Records</title>
  <link rel="stylesheet" href="/static/styles.css?v={{ asset_v|default('0') }}" />
  <style>
    :root{--panel:#fff;--muted:#64748b;--border:#e2e8f0;--chip:#f1f5f9;--shadow:0 8px 24px rgba(2,6,23,.06);--ink:#0f172a}
    body{background:#f8fafc}
    .container{padding:20px;max-width:1280px;margin:0 auto}
    .grid{display:grid;gap:16px}
    .card{margin-bottom:0;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
    .section{padding:16px}
    .summary{display:flex;flex-wrap:wrap;gap:12px}
    .chip,.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);white-space:nowrap}
    .chip{background:var(--chip);padding:6px 12px;border-radius:999px;color:var(--ink);font-weight:600}
    .pill{background:#f8fafc;padding:3px 9px;border-radius:999px;font-size:12px}
    .badge-red{background:#fee2e2;border-color:#fecaca;color:#991b1b}
    .badge-orange{background:#ffedd5;border-color:#fed7aa;color:#9a3412}
    .badge-yellow{background:#fef9c3;border-color:#fde68a;color:#854d0e}
    .badge-blue{background:#dbeafe;border-color:#bfdbfe;color:#1e40af}
    .badge-green{background:#dcfce7;border-color:#bbf7d0;color:#065f46}
    .badge-slate{background:#e2e8f0;border-color:#cbd5e1;color:#334155}
    .status-staged{background:#e2e8f0;color:#334155;border-color:#cbd5e1}
    .status-processed{background:#dcfce7;color:#065f46;border-color:#bbf7d0}
    .hero{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(260px,.6fr);gap:16px;align-items:stretch}
    .hero-title{font-size:24px;line-height:1.2;font-weight:800;color:var(--ink);margin:0}
    .hero-copy{color:var(--muted);margin:8px 0 0;max-width:760px}
    .queue-panel{background:#0f172a;color:#fff;border-radius:10px;padding:16px;display:grid;align-content:center;gap:10px}
    .queue-panel .big{font-size:32px;font-weight:800;line-height:1}
    .queue-panel .small{color:#cbd5e1;font-size:13px}
    .toolbar-row{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .input{transition:border .2s}
    .input:focus{outline:none;border-color:#94a3b8}
    table{border-collapse:separate;border-spacing:0;width:100%}
    thead th{font-size:12px;text-transform:uppercase;color:var(--muted);background:#f8fafc;border-bottom:1px solid var(--border);padding:10px;text-align:left}
    tbody td{padding:10px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
    tbody tr:hover{background:#f8fafc}
    .table-scroll{overflow:auto;border:1px solid var(--border);border-radius:10px}
    .table-scroll table{min-width:980px}
    .table-scroll thead th{position:sticky;top:0;z-index:2}
    .doctor-scroll{max-height:320px}
    .records-scroll{max-height:58vh}
    .text-center{text-align:center}
    .table-id{font-weight:700;color:#0f172a}
    .subtext{font-size:12px;color:var(--muted);margin-top:3px}
    .empty-state{padding:32px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:10px;background:#f8fafc}
    .actions a.btn{display:inline-flex;align-items:center;gap:6px;text-decoration:none}
    .error{padding:16px;border:1px solid #fecaca;background:#fee2e2;color:#991b1b;border-radius:10px}
    @media (max-width:760px){.hero{grid-template-columns:1fr}.toolbar-row{align-items:stretch}.toolbar-row>*{width:100%;max-width:none!important}.doctor-scroll{max-height:280px}.records-scroll{max-height:62vh}}
  </style>
</head>
<body>
  <div class="topbar" style="justify-content:space-between;padding:12px 24px">
    <div style="font-weight:700">MER Quality Dashboard</div>
    <div style="display:flex;gap:8px;align-items:center">
      <a class="btn" href="/logic">Logic</a>
      <a class="btn" href="/">Back</a>
    </div>
  </div>
  <div id="root" class="container">Loading...</div>

  <script>
    const root = document.getElementById('root');
    let records = [];
    let searchTerm = '';
    let filterCategory = 'all';

    const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (ch) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[ch]));

    const countByCategory = (rows) => {
      const counts = {staged:0, assignback:0, ops_attention:0, flags:0, tech_issues:0, pass:0};
      rows.forEach((r) => { if (counts[r.category] !== undefined) counts[r.category] += 1; });
      return counts;
    };

    const statusLabel = (r) => {
      if (r.status === 'processed') return r.category === 'pass' ? 'Processed' : String(r.category || '').replace('_', ' ');
      return 'Staged';
    };
    const accuracyLabel = (r) => r.accuracy == null ? '-' : `${Number(r.accuracy).toFixed(1)}%`;
    const mediaLabel = (r) => (r.mediaTypes || []).map((x) => String(x).toUpperCase()).join(', ') || '-';
    const categoryName = (key) => String(key || '-').replace('_', ' ');
    const firstMediaUrl = (r) => (r.mediaLinks && r.mediaLinks[0] && r.mediaLinks[0].url) || '';

    function buildStats(rows, key) {
      const stats = {};
      rows.forEach((r) => {
        const name = r[key] || '-';
        stats[name] = stats[name] || {name, total:0, assignback:0, ops_attention:0, flags:0, tech_issues:0, pass:0, avgAccuracy:0, avgScore:0};
        const st = stats[name];
        st.total += 1;
        if (st[r.category] !== undefined) st[r.category] += 1;
        st.avgAccuracy += Number(r.accuracy || 0);
        st.avgScore += Number(r.qcScore || 0);
      });
      return Object.values(stats).map((st) => ({
        ...st,
        avgAccuracy: st.total ? (st.avgAccuracy / st.total).toFixed(1) : '0.0',
        avgScore: st.total ? Math.round(st.avgScore / st.total) : 0
      }));
    }

    function renderStats(title, rows, options = {}) {
      const scrollClass = options.scroll ? ` table-scroll ${options.scrollClass || ''}` : '';
      if (!rows.length) {
        return `<div class="card section"><h3 style="margin:0 0 8px">${esc(title)}</h3><div class="empty-state">Statistics will appear after records are processed.</div></div>`;
      }
      const body = rows.map((st) => `
        <tr>
          <td>${esc(st.name)}</td>
          <td class="text-center">${st.total}</td>
          <td class="text-center">${st.assignback || '-'}</td>
          <td class="text-center">${st.ops_attention || '-'}</td>
          <td class="text-center">${st.flags || '-'}</td>
          <td class="text-center">${st.tech_issues || '-'}</td>
          <td class="text-center">${st.pass || '-'}</td>
          <td class="text-center">${st.avgAccuracy}%</td>
          <td class="text-center">${st.avgScore}</td>
        </tr>
      `).join('');
      return `
        <div class="card section">
          <h3 style="margin:0 0 8px">${esc(title)}</h3>
          <div class="${scrollClass || 'table-scroll'}">
            <table>
              <thead><tr><th>Name</th><th>Total</th><th>Assignback</th><th>Ops Attn</th><th>Flags</th><th>Tech</th><th>Pass</th><th>Avg Accuracy</th><th>Avg Score</th></tr></thead>
              <tbody>${body}</tbody>
            </table>
          </div>
        </div>
      `;
    }

    function getFilteredRecords() {
      const s = searchTerm.toLowerCase();
      return records.filter((r) => {
        const haystack = [r.id, r.customerName, r.doctorName, r.insurerName, ...(r.mediaTypes || [])].join(' ').toLowerCase();
        return haystack.includes(s) && (filterCategory === 'all' || r.category === filterCategory);
      });
    }

    function render() {
      const counts = countByCategory(records);
      const processed = records.filter((r) => r.status === 'processed');
      const filtered = getFilteredRecords();
      const recordRows = filtered.map((r) => `
        <tr>
          <td><div class="table-id">${esc(r.id)}</div><div class="subtext">${r.merAvailable ? 'MER ready' : 'MER missing'}</div></td>
          <td><span class="pill ${r.status === 'processed' ? 'status-processed' : 'status-staged'}">${esc(statusLabel(r))}</span></td>
          <td><span class="pill">${Number(r.numCalls || 0)} call${Number(r.numCalls || 0) === 1 ? '' : 's'}</span><div class="subtext">${esc(mediaLabel(r))}</div></td>
          <td>${esc(r.customerName || '-')}</td>
          <td>${esc(r.doctorName || '-')}</td>
          <td>${esc(r.insurerName || '-')}</td>
          <td class="text-center">${esc(accuracyLabel(r))}</td>
          <td class="text-center">${esc(r.questionsAsked || '-')}</td>
          <td class="text-center actions" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
            <a href="/record/${encodeURIComponent(r.id)}" class="btn">Open</a>
            ${r.merUrl ? `<a href="${esc(r.merUrl)}" class="btn" target="_blank" rel="noopener">MER</a>` : ''}
            ${firstMediaUrl(r) ? `<a href="${esc(firstMediaUrl(r))}" class="btn" target="_blank" rel="noopener">Media</a>` : ''}
          </td>
        </tr>
      `).join('');

      root.innerHTML = `
        <div class="grid">
          <div class="hero">
            <div class="card section">
              <h1 class="hero-title">MER Quality Dashboard</h1>
              <p class="hero-copy">Processed QA, QC, transcript, media, and final-decision data for the current verification batch.</p>
              <div class="summary" style="margin-top:16px">
                <span class="chip">MER PDFs <span class="pill">${records.filter((r) => r.merAvailable).length}</span></span>
                <span class="chip">Calls <span class="pill">${records.reduce((n, r) => n + Number(r.numCalls || 0), 0)}</span></span>
                <span class="chip badge-slate">Staged <span class="pill">${counts.staged}</span></span>
              </div>
            </div>
            <div class="queue-panel">
              <div class="small">Batch Progress</div>
              <div class="big">${processed.length}/${records.length}</div>
              <div class="small">records processed</div>
            </div>
          </div>

          <div class="card section">
            <div class="summary">
              <span class="chip">Total Records <span class="pill">${records.length}</span></span>
              <span class="chip badge-slate">Staged <span class="pill">${counts.staged}</span></span>
              <span class="chip badge-red">Assignback <span class="pill">${counts.assignback}</span></span>
              <span class="chip badge-orange">Ops Attention <span class="pill">${counts.ops_attention}</span></span>
              <span class="chip badge-yellow">Flags <span class="pill">${counts.flags}</span></span>
              <span class="chip badge-blue">Tech Issues <span class="pill">${counts.tech_issues}</span></span>
              <span class="chip badge-green">Pass <span class="pill">${counts.pass}</span></span>
            </div>
          </div>

          <div class="card section toolbar-row">
            <input id="search" value="${esc(searchTerm)}" placeholder="Search record, customer, doctor, insurer, or media..." class="input" style="padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;flex:1;max-width:520px" />
            <select id="category" class="input" style="padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px">
              ${['all','staged','assignback','ops_attention','flags','tech_issues','pass'].map((x) => `<option value="${x}" ${filterCategory === x ? 'selected' : ''}>${esc(x === 'all' ? 'All Categories' : categoryName(x))}</option>`).join('')}
            </select>
          </div>

          ${renderStats('Insurer-wise Statistics', buildStats(processed, 'insurerName'))}
          ${renderStats('Doctor-wise Statistics', buildStats(processed, 'doctorName'), {scroll: true, scrollClass: 'doctor-scroll'})}

          <div class="card section">
            <h3 style="margin:0 0 8px">MER Records (${filtered.length})</h3>
            <div class="table-scroll records-scroll">
              <table>
                <thead><tr><th>MER ID</th><th>Status</th><th>Media</th><th>Customer</th><th>Doctor</th><th>Insurer</th><th>Accuracy</th><th>Questions</th><th>Actions</th></tr></thead>
                <tbody>${recordRows || '<tr><td colspan="9" class="text-center">No records match this filter.</td></tr>'}</tbody>
              </table>
            </div>
          </div>
        </div>
      `;

      document.getElementById('search').addEventListener('input', (e) => {
        searchTerm = e.target.value;
        render();
        const search = document.getElementById('search');
        search.focus();
        search.setSelectionRange(searchTerm.length, searchTerm.length);
      });
      document.getElementById('category').addEventListener('change', (e) => {
        filterCategory = e.target.value;
        render();
      });
    }

    async function init() {
      try {
        const response = await fetch('/api/records_dashboard', {cache: 'no-store'});
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        records = payload.records || [];
        render();
      } catch (err) {
        root.innerHTML = `<div class="error">Unable to load records: ${esc(err.message || err)}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
